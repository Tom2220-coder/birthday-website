<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      overflow-x: hidden;
    }

    body {
      background: #111;
    }

    button {
      font: inherit;
    }

    .page {
      position: relative;
      min-height: 100svh;
      overflow: hidden;
      isolation: isolate;
    }

    .background-img,
    #letterPage::before {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .main-content {
      min-height: 100svh;
      display: grid;
      grid-template-rows: 1fr auto 1fr;
      place-items: center;
      padding: clamp(20px, 5vw, 56px);
      text-align: center;
    }

    .birthday-title {
      align-self: end;
      margin: 0 0 clamp(16px, 5vh, 48px);
      color: #ffc0da;
      font-family: "Pacifico", "Segoe Script", cursive;
      font-size: clamp(3rem, 13vw, 8.5rem);
      font-style: italic;
      line-height: 0.95;
      text-shadow: 0 4px 14px rgba(0, 0, 0, 0.75);
      z-index: 2;
    }

    .birthday-title span {
      display: block;
      color: #ffc0da;
      text-shadow:
        0 4px 14px rgba(0, 0, 0, 0.75),
        0 0 12px rgba(255, 192, 218, 0.5);
    }

    .plane-banner {
      position: absolute;
      top: 46%;
      left: 0;
      display: flex;
      align-items: center;
      width: max-content;
      animation: fly 12s linear infinite;
      z-index: 3;
    }

    .banner {
      max-width: min(72vw, 720px);
      padding: clamp(8px, 1.8vw, 14px) clamp(16px, 5vw, 40px);
      border: 2px solid #e91e63;
      border-radius: 999px;
      background-color: rgba(255, 255, 255, 0.95);
      color: #e91e63;
      font-size: clamp(0.9rem, 2.2vw, 1.35rem);
      font-weight: 800;
      line-height: 1.35;
      white-space: nowrap;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.2);
    }

    .rope {
      width: clamp(36px, 9vw, 80px);
      height: 2px;
      margin-left: -2px;
      background-color: #555;
    }

    .plane-img {
      width: clamp(76px, 15vw, 140px);
      transform: translateY(4px);
    }

    .open-letter-btn {
      align-self: start;
      min-width: min(78vw, 220px);
      margin-top: clamp(80px, 22vh, 220px);
      padding: 0.85rem 1.5rem;
      border: 2px solid #e91e63;
      border-radius: 999px;
      background-color: rgba(255, 255, 255, 0.96);
      color: #e91e63;
      font-size: clamp(1rem, 2.4vw, 1.25rem);
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
      transition: transform 180ms ease, box-shadow 180ms ease;
      z-index: 5;
    }

    .open-letter-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
    }

    .confetti {
      position: fixed;
      top: -20px;
      border-radius: 50%;
      opacity: 0.75;
      animation: fall linear infinite;
      pointer-events: none;
      z-index: 10;
    }

    #letterPage {
      display: none;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 4vw, 48px);
    }

    #letterPage.intro-playing .best-wishes-text,
    #letterPage.intro-playing .letter-layout {
      opacity: 0;
      pointer-events: none;
    }

    #letterPage::before {
      content: "";
      background: url("kk.jpg") center / cover no-repeat;
    }

    .letter-layout {
      width: min(1180px, 100%);
      display: grid;
      grid-template-columns: minmax(110px, 180px) minmax(0, 560px) minmax(110px, 180px);
      gap: clamp(12px, 3vw, 36px);
      align-items: start;
      justify-content: center;
      margin-top: clamp(76px, 14vh, 140px);
      opacity: 1;
      transition: opacity 900ms ease;
    }

    .cake-intro {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      pointer-events: none;
      z-index: 6;
    }

    #letterPage.intro-playing .cake-intro {
      display: flex;
    }

    .dust {
      position: absolute;
      left: 50%;
      bottom: -7%;
      width: calc(var(--size) * 1px);
      height: calc(var(--size) * 1px);
      border-radius: 50%;
      background: #ffd86b;
      opacity: 0;
      transform:
        translateX(calc(var(--x) * 1px))
        translateY(calc(var(--ground-y) * -1px))
        scale(0.35);
      box-shadow: 0 0 7px currentColor;
      color: var(--color);
      animation: dustToCake 22000ms linear forwards;
      animation-delay: calc(var(--delay) * 1ms);
      will-change: transform, opacity;
      contain: layout paint style;
    }

    .cake {
      display: none;
    }

    .burst {
      position: absolute;
      left: 50%;
      bottom: 31%;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color);
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.2);
      box-shadow: 0 0 8px currentColor;
      color: var(--color);
      animation: cakeSpark 1600ms ease-out 21600ms forwards;
      will-change: transform, opacity;
      contain: layout paint style;
    }

    .note-wrap {
      position: relative;
      width: min(100%, 560px);
      z-index: 2;
    }

    .note {
      --line-height: 28px;
      --note-padding: clamp(24px, 5vw, 42px);
      position: relative;
      width: 100%;
      max-height: min(760px, 82svh);
      min-height: min(640px, 78svh);
      padding: var(--note-padding);
      border-radius: 18px;
      background-color: #fff8dc;
      background-image: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent calc(var(--line-height) - 1px),
        rgba(0, 0, 0, 0.24) calc(var(--line-height) - 1px),
        rgba(0, 0, 0, 0.24) var(--line-height)
      );
      background-size: 100% var(--line-height);
      background-position: 0 calc(var(--note-padding) - 8px);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3);
      color: #2b1d16;
      font-size: clamp(1rem, 2vw, 1.25rem);
      line-height: var(--line-height);
      overflow-y: auto;
      opacity: 0;
      transform: translateY(70px);
      animation: slideUpFade 900ms ease-out forwards;
      z-index: 2;
    }

    #letterText {
      display: block;
      white-space: pre-wrap;
      transform: translateY(-3px);
    }

    .letter-char {
      position: relative;
      display: inline-block;
      min-width: 0.15em;
      opacity: 0;
      transform: translateY(10px) scale(0.9);
      animation: letterPop 420ms cubic-bezier(0.2, 0.8, 0.2, 1.25) forwards;
    }

    .letter-word {
      display: inline-block;
      white-space: nowrap;
    }

    .letter-space {
      white-space: pre;
    }

    .red-heart {
      color: #e91e63;
      text-shadow: 0 0 8px rgba(233, 30, 99, 0.45);
    }

    .letter-char.spark::before,
    .letter-char.spark::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0);
      animation: fireSpark 560ms ease-out forwards;
    }

    .letter-char.spark::before {
      background: #ffcf33;
      box-shadow:
        0 -18px 0 #ff5c8a,
        15px -10px 0 #ff8a00,
        17px 6px 0 #fff04a,
        -14px 8px 0 #ff3d3d,
        -13px -11px 0 #ffffff;
    }

    .letter-char.spark::after {
      width: 2px;
      height: 18px;
      border-radius: 999px;
      background: linear-gradient(to bottom, #fff, #ff7a00, transparent);
      box-shadow:
        12px 0 0 #ffde59,
        -12px 0 0 #ff4f87,
        0 12px 0 #ff3d3d;
      transform: translate(-50%, -50%) rotate(35deg) scale(0);
    }

    #letterText.typing::after {
      content: "|";
      color: #111;
      font-weight: 800;
      animation: blink 1s step-start infinite;
    }

    .cute-img {
      position: absolute;
      top: 0;
      left: 0;
      width: clamp(54px, 8vw, 82px);
      transform: translate(-68%, -72%) rotate(-8deg);
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.22));
      pointer-events: none;
      z-index: 4;
    }

    .photo-section {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 0;
      z-index: 1;
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.24));
      isolation: isolate;
    }

    .photo-section::before {
      content: "";
      position: absolute;
      top: -18px;
      bottom: -8px;
      left: 50%;
      width: 8px;
      border-radius: 999px;
      background:
        linear-gradient(90deg, transparent 0 18%, rgba(255, 255, 255, 0.82) 22% 36%, transparent 42%),
        repeating-linear-gradient(to bottom, #36e6ff 0 12px, #b8f7ff 12px 24px, #ffe66d 24px 36px);
      box-shadow:
        0 0 14px rgba(54, 230, 255, 0.75),
        0 0 28px rgba(255, 230, 109, 0.32);
      --rope-x: -50%;
      opacity: 0;
      transform: translateX(-50%) scaleY(0);
      transform-origin: top center;
      z-index: 0;
    }

    .photo-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      transform: translateY(-50px) rotate(var(--tilt, -2deg));
      transform-origin: top center;
      z-index: 1;
    }

    .photo-wrapper .photo {
      position: relative;
      z-index: 1;
    }

    .photo-wrapper:nth-of-type(2n) {
      --tilt: 2deg;
    }

    .photo-wrapper::before {
      content: "";
      position: absolute;
      top: -10px;
      left: 50%;
      width: 34px;
      height: 16px;
      border-radius: 999px 999px 8px 8px;
      background: linear-gradient(135deg, #36e6ff, #ffe66d);
      border: 2px solid rgba(255, 255, 255, 0.72);
      box-shadow:
        0 4px 10px rgba(0, 0, 0, 0.24),
        0 0 12px rgba(54, 230, 255, 0.46);
      transform: translateX(-50%) rotate(var(--tilt, -2deg));
      z-index: 3;
    }

    .photo-wrapper::after {
      content: "✦  ✧  ✦";
      position: absolute;
      top: -26px;
      left: 50%;
      color: #ffe66d;
      font-size: 17px;
      line-height: 1;
      letter-spacing: 5px;
      text-shadow:
        0 2px 6px rgba(0, 0, 0, 0.24),
        0 0 10px rgba(255, 230, 109, 0.8);
      transform: translateX(-50%);
      z-index: 4;
    }

    .photo {
      --frame-size: clamp(8px, 1.45vw, 14px);
      width: clamp(84px, 13vw, 150px);
      aspect-ratio: 3 / 4;
      object-fit: cover;
      padding: var(--frame-size);
      border: 2px solid rgba(255, 240, 160, 0.82);
      border-radius: 14px;
      box-shadow:
        inset 0 0 0 1px rgba(54, 230, 255, 0.48),
        inset 0 0 0 5px rgba(255, 255, 255, 0.08),
        0 0 18px rgba(54, 230, 255, 0.34),
        0 0 28px rgba(255, 230, 109, 0.18),
        0 10px 18px rgba(0, 0, 0, 0.34);
      background:
        linear-gradient(90deg, rgba(54, 230, 255, 0.74), rgba(54, 230, 255, 0.74)) top left / 26px 3px no-repeat,
        linear-gradient(90deg, rgba(255, 230, 109, 0.86), rgba(255, 230, 109, 0.86)) top right / 26px 3px no-repeat,
        linear-gradient(90deg, rgba(255, 230, 109, 0.86), rgba(255, 230, 109, 0.86)) bottom left / 26px 3px no-repeat,
        linear-gradient(90deg, rgba(54, 230, 255, 0.74), rgba(54, 230, 255, 0.74)) bottom right / 26px 3px no-repeat,
        linear-gradient(180deg, rgba(54, 230, 255, 0.74), rgba(54, 230, 255, 0.74)) top left / 3px 26px no-repeat,
        linear-gradient(180deg, rgba(255, 230, 109, 0.86), rgba(255, 230, 109, 0.86)) top right / 3px 26px no-repeat,
        linear-gradient(180deg, rgba(255, 230, 109, 0.86), rgba(255, 230, 109, 0.86)) bottom left / 3px 26px no-repeat,
        linear-gradient(180deg, rgba(54, 230, 255, 0.74), rgba(54, 230, 255, 0.74)) bottom right / 3px 26px no-repeat,
        rgba(255, 255, 255, 0.055);
      backdrop-filter: blur(2px);
    }

    .rope-line,
    .long-top-line {
      width: 8px;
      border-radius: 999px;
      background:
        linear-gradient(90deg, transparent 0 18%, rgba(255, 255, 255, 0.82) 22% 36%, transparent 42%),
        repeating-linear-gradient(to bottom, #36e6ff 0 12px, #b8f7ff 12px 24px, #ffe66d 24px 36px);
      box-shadow:
        0 0 14px rgba(54, 230, 255, 0.72),
        0 0 28px rgba(255, 230, 109, 0.28);
    }

    .rope-line {
      height: clamp(48px, 11vh, 120px);
      margin: -6px 0;
      transform-origin: top center;
    }

    .long-top-line {
      height: clamp(44px, 12vh, 140px);
      transform-origin: top center;
      opacity: 0;
      transform: scaleY(0);
    }

    #letterPage.final-reveal .photo-section::before {
      animation: ropeDrop 1.7s cubic-bezier(.18, .78, .22, 1) forwards;
    }

    #letterPage.final-reveal .long-top-line {
      animation: ropeDrop 1.35s cubic-bezier(.18, .78, .22, 1) .25s forwards;
    }

    #letterPage.final-reveal .photo-wrapper {
      animation: photoDropIn 1.25s cubic-bezier(.18, .78, .22, 1.06) forwards;
    }

    .best-wishes-text {
      position: absolute;
      top: 1.5%;
      left: 50%;
      max-width: 96vw;
      transform: translateX(-50%);
      color: rgba(210, 0, 0, 0.58);
      font-family: "Lobster", "Segoe Script", cursive;
      font-size: clamp(3rem, 14vw, 9rem);
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
      text-shadow: 0 3px 10px rgba(255, 255, 255, 0.28);
      pointer-events: none;
      z-index: 0;
      opacity: 1;
      transition: opacity 900ms ease;
    }

    @keyframes fly {
      from {
        transform: translateX(-110%);
      }

      to {
        transform: translateX(112vw);
      }
    }

    @keyframes fall {
      from {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 1;
      }

      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }

    @keyframes slideUpFade {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    @keyframes dustToCake {
      0% {
        opacity: 0;
        transform:
          translateX(calc(var(--x) * 1px))
          translateY(calc(var(--ground-y) * -1px))
          scale(0.25);
      }

      10% {
        opacity: 0.95;
        transform:
          translateX(calc(var(--ground-ring-x) * 1px))
          translateY(calc(var(--ground-ring-y) * -1px))
          rotate(180deg)
          scale(0.72);
      }

      22% {
        transform:
          translateX(calc(var(--vortex-x-a) * 1px))
          translateY(calc(var(--vortex-y-a) * -1px))
          rotate(620deg)
          scale(0.92);
      }

      30% {
        transform:
          translateX(calc(var(--vortex-x-spin-1) * 1px))
          translateY(calc(var(--vortex-y-spin-1) * -1px))
          rotate(960deg)
          scale(0.98);
      }

      38% {
        transform:
          translateX(calc(var(--vortex-x-b) * 1px))
          translateY(calc(var(--vortex-y-b) * -1px))
          rotate(1300deg)
          scale(1);
      }

      46% {
        transform:
          translateX(calc(var(--vortex-x-spin-2) * 1px))
          translateY(calc(var(--vortex-y-spin-2) * -1px))
          rotate(1640deg)
          scale(1.02);
      }

      54% {
        transform:
          translateX(calc(var(--vortex-x-c) * 1px))
          translateY(calc(var(--vortex-y-c) * -1px))
          rotate(1980deg)
          scale(1.04);
      }

      62% {
        transform:
          translateX(calc(var(--vortex-x-spin-3) * 1px))
          translateY(calc(var(--vortex-y-spin-3) * -1px))
          rotate(2320deg)
          scale(1.04);
      }

      66% {
        transform:
          translateX(calc(var(--vortex-x-spin-4) * 1px))
          translateY(calc(var(--vortex-y-spin-4) * -1px))
          rotate(2660deg)
          scale(1.06);
      }

      70% {
        transform:
          translateX(calc(var(--near-merge-x) * 1px))
          translateY(calc(var(--near-merge-y) * -1px))
          rotate(2840deg)
          scale(1.1);
      }

      76% {
        transform:
          translateX(calc(var(--merge-x) * 1px))
          translateY(calc(var(--merge-y) * -1px))
          rotate(2920deg)
          scale(1.18);
      }

      80% {
        opacity: 1;
        transform:
          translateX(calc(var(--end-x) * 1px))
          translateY(calc(var(--end-y) * -1px))
          rotate(3180deg)
          scale(1);
      }

      84% {
        opacity: var(--twinkle-low);
        transform:
          translateX(calc((var(--end-x) + var(--twinkle-x)) * 1px))
          translateY(calc((var(--end-y) + var(--twinkle-y)) * -1px))
          rotate(3180deg)
          scale(var(--twinkle-scale));
      }

      88% {
        opacity: 1;
        transform:
          translateX(calc(var(--end-x) * 1px))
          translateY(calc(var(--end-y) * -1px))
          rotate(3180deg)
          scale(1.18);
      }

      91% {
        opacity: var(--twinkle-high);
        transform:
          translateX(calc((var(--end-x) - var(--twinkle-x)) * 1px))
          translateY(calc((var(--end-y) - var(--twinkle-y)) * -1px))
          rotate(3180deg)
          scale(1.04);
      }

      94% {
        opacity: 1;
        transform:
          translateX(calc(var(--end-x) * 1px))
          translateY(calc(var(--end-y) * -1px))
          rotate(3180deg)
          scale(1.15);
      }

      97% {
        opacity: var(--twinkle-low);
        transform:
          translateX(calc((var(--end-x) + var(--twinkle-x)) * 1px))
          translateY(calc((var(--end-y) + var(--twinkle-y)) * -1px))
          rotate(3180deg)
          scale(var(--twinkle-scale));
      }

      100% {
        opacity: 0;
        transform:
          translateX(calc((var(--end-x) + var(--explode-x)) * 1px))
          translateY(calc((var(--end-y) + var(--explode-y)) * -1px))
          rotate(3180deg)
          scale(1.85);
      }
    }

    @keyframes cakeSpark {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.2);
      }

      100% {
        opacity: 0;
        transform:
          translate(
            calc(-50% + var(--burst-x) * 1px),
            calc(-50% + var(--burst-y) * 1px)
          )
          scale(1.15);
      }
    }

    @keyframes letterPop {
      60% {
        opacity: 1;
        transform: translateY(-2px) scale(1.08);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes fireSpark {
      18% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.7);
      }

      to {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.8);
      }
    }

    @keyframes dropIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes photoDropIn {
      to {
        opacity: 1;
        transform: translateY(0) rotate(var(--tilt, -2deg));
      }
    }

    @keyframes ropeDrop {
      0% {
        opacity: 0;
        transform: translateX(var(--rope-x, 0)) scaleY(0);
      }

      70% {
        opacity: 1;
        transform: translateX(var(--rope-x, 0)) scaleY(1.08);
      }

      100% {
        opacity: 1;
        transform: translateX(var(--rope-x, 0)) scaleY(1);
      }
    }

    @media (max-width: 820px) {
      #letterPage {
        align-items: flex-start;
        overflow-y: auto;
        padding: 12px 6px 18px;
      }

      .letter-layout {
        width: 100%;
        grid-template-columns: minmax(48px, 70px) minmax(0, 1fr) minmax(48px, 70px);
        gap: 6px;
        align-items: start;
        margin-top: clamp(82px, 16vh, 132px);
      }

      .photo-section {
        display: flex;
        min-width: 0;
      }

      .note {
        --line-height: 24px;
        width: 100%;
        min-height: min(520px, 68svh);
        max-height: 70svh;
        font-size: clamp(0.78rem, 3.1vw, 0.98rem);
      }

      .note-wrap {
        width: 100%;
      }

      .photo {
        --frame-size: 5px;
        width: clamp(48px, 16vw, 70px);
        border-radius: 7px;
        border-width: 1px;
        background-size:
          14px 2px,
          14px 2px,
          14px 2px,
          14px 2px,
          2px 14px,
          2px 14px,
          2px 14px,
          2px 14px,
          auto;
      }

      .photo-wrapper::before {
        width: 24px;
        height: 11px;
        top: -7px;
      }

      .photo-wrapper::after {
        top: -18px;
        font-size: 12px;
        letter-spacing: 2px;
      }

      .rope-line {
        height: clamp(28px, 7vh, 64px);
        width: 5px;
        margin: -4px 0;
      }

      .long-top-line {
        height: clamp(28px, 8vh, 70px);
        width: 5px;
      }

      .cute-img {
        width: clamp(42px, 13vw, 58px);
        transform: translate(-42%, -62%) rotate(-8deg);
      }
    }

    @media (max-width: 520px) {
      .main-content {
        padding: 18px;
      }

      .birthday-title {
        margin-bottom: 20px;
      }

      .banner {
        max-width: 62vw;
        white-space: normal;
      }

      .open-letter-btn {
        margin-top: 26vh;
      }

      .note {
        --note-padding: 24px;
        padding-inline: 12px;
        border-radius: 14px;
      }

      .best-wishes-text {
        top: 2.5%;
        font-size: clamp(2.3rem, 19vw, 4.4rem);
      }
    }
  </style>
</head>
<body>
  <main class="page" id="mainPage">
    <img class="background-img" src="kk.jpg" alt="Birthday background">

    <section class="main-content" aria-label="Birthday greeting">
      <h1 class="birthday-title">
        Happy 🎉
        <span>Birthday</span>
      </h1>

      <div class="plane-banner" aria-hidden="true">
        <div class="banner">🎈 Chúc chị tui sinh nhật zui zẻ! hé hé hé 🎉</div>
        <div class="rope"></div>
        <img src="kimm.png" alt="" class="plane-img">
      </div>

      <button class="open-letter-btn" type="button" onclick="showLetter()">📩 Mở thư</button>
    </section>
  </main>

  <section class="page" id="letterPage" aria-label="Birthday letter">
    <div class="cake-intro" id="cakeIntro" aria-hidden="true"></div>

    <div class="best-wishes-text">Best Wishes</div>

    <div class="letter-layout">
      <div class="photo-section" aria-hidden="true">
        <div class="long-top-line"></div>
        <div class="photo-wrapper" style="animation-delay: 2.2s;">
          <img src="khanh4.png" alt="" class="photo">
          <div class="rope-line"></div>
        </div>
        <div class="photo-wrapper" style="animation-delay: 3.9s;">
          <img src="khanh5.png" alt="" class="photo">
          <div class="rope-line"></div>
        </div>
        <div class="photo-wrapper" style="animation-delay: 5.6s;">
          <img src="khanh6.png" alt="" class="photo">
        </div>
      </div>

      <div class="note-wrap">
        <img src="khanh11.png" alt="Cute birthday decoration" class="cute-img">
        <article class="note">
          <div id="letterText" class="typing"></div>
        </article>
      </div>

      <div class="photo-section" aria-hidden="true">
        <div class="long-top-line"></div>
        <div class="photo-wrapper" style="animation-delay: 2.2s;">
          <img src="khanh1.png" alt="" class="photo">
          <div class="rope-line"></div>
        </div>
        <div class="photo-wrapper" style="animation-delay: 3.9s;">
          <img src="khanh2.png" alt="" class="photo">
          <div class="rope-line"></div>
        </div>
        <div class="photo-wrapper" style="animation-delay: 5.6s;">
          <img src="khanh3.png" alt="" class="photo">
        </div>
      </div>
    </div>
  </section>

  <script>
    const colors = ["#ff0", "#f0f", "#0ff", "#0f0", "#f00", "#00f"];
    const confettiCount = window.matchMedia("(max-width: 520px)").matches ? 28 : 60;
    let confettiCreated = false;

    function createConfetti() {
      if (confettiCreated) return;
      confettiCreated = true;

      for (let i = 0; i < confettiCount; i++) {
        const confetti = document.createElement("div");
        const size = Math.random() * 8 + 5;

        confetti.className = "confetti";
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.width = size + "px";
        confetti.style.height = size + "px";
        confetti.style.animationDuration = Math.random() * 2 + 2 + "s";
        confetti.style.animationDelay = Math.random() * 3 + "s";

        document.body.appendChild(confetti);
      }
    }

    function clearConfetti() {
      document.querySelectorAll(".confetti").forEach((confetti) => confetti.remove());
      confettiCreated = false;
    }

    createConfetti();

    function createCakeIntroParticles() {
      const intro = document.getElementById("cakeIntro");
      const layerColors = ["#ffd60a", "#ffb703", "#ff9f1c", "#ffe66d", "#fff3b0", "#f77f00"];
      const flameColors = ["#fff700", "#ffd60a", "#ff9f1c", "#ffffff"];
      const textColors = ["#fff8c7", "#fff3a3", "#ffe66d", "#ffd60a"];
      const burstColors = ["#ffd60a", "#ffb703", "#ff9f1c", "#fff3b0", "#f77f00", "#ffffff"];
      const fitByHeight = (window.innerHeight * 0.94 / 650) * 840;
      const cakeWidth = Math.min(window.innerWidth * 1.08, fitByHeight, 1120);
      const scale = cakeWidth / 560;
      const targets = [];
      const particleFragment = document.createDocumentFragment();

      intro.querySelectorAll(".dust, .burst").forEach((particle) => particle.remove());

      function addCakeArea(count, options) {
        for (let i = 0; i < count; i++) {
          const x = options.x + (Math.random() - 0.5) * options.w;
          const y = options.y + (Math.random() - 0.5) * options.h;
          targets.push({ x, y, color: options.colors[i % options.colors.length], size: options.size });
        }
      }

      function addCakeLine(count, options) {
        for (let i = 0; i < count; i++) {
          const progress = count === 1 ? 0 : i / (count - 1);
          const x = options.x1 + (options.x2 - options.x1) * progress + (Math.random() - 0.5) * options.jitter;
          const y = options.y1 + (options.y2 - options.y1) * progress + (Math.random() - 0.5) * options.jitter;
          targets.push({ x, y, color: options.colors[i % options.colors.length], size: options.size });
        }
      }

      function addCandle(x) {
        addCakeArea(28, { x, y: 360, w: 30, h: 92, colors: ["#fff3b0", "#ffd60a", "#ffb703"], size: 5.5 });
        addCakeArea(28, { x, y: 442, w: 62, h: 66, colors: flameColors, size: 6 });
      }

      function addTextTargets(lines) {
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
        const fontSize = 126;
        const sampleGap = window.innerWidth < 680 ? 12 : 10;
        const lineHeight = 122;

        canvas.width = 1180;
        canvas.height = 300;
        context.clearRect(0, 0, canvas.width, canvas.height);
        context.fillStyle = "#fff3b0";
        context.strokeStyle = "#ffd60a";
        context.lineWidth = 1.4;
        context.lineJoin = "round";
        context.lineCap = "round";
        context.textAlign = "center";
        context.textBaseline = "middle";

        lines.forEach((line, index) => {
          const y = 72 + index * lineHeight;
          context.font = `800 ${fontSize}px "Arial Rounded MT Bold", "Trebuchet MS", "Segoe UI", Arial, sans-serif`;
          context.strokeText(line, canvas.width / 2, y);
          context.fillText(line, canvas.width / 2, y);
        });

        const pixels = context.getImageData(0, 0, canvas.width, canvas.height).data;

        for (let y = 0; y < canvas.height; y += sampleGap) {
          for (let x = 0; x < canvas.width; x += sampleGap) {
            const alpha = pixels[(y * canvas.width + x) * 4 + 3];

            if (alpha > 84) {
              targets.push({
                x: (x - canvas.width / 2) * 0.4,
                y: 548 + (canvas.height - y) * 0.22,
                color: textColors[(x + y) % textColors.length],
                size: 4.7,
              });
            }
          }
        }
      }

      addCakeArea(168, { x: 0, y: 96, w: 550, h: 142, colors: ["#ffd60a", "#ffb703", "#ff9f1c", "#fff3b0"], size: 8.4 });
      addCakeArea(118, { x: 0, y: 220, w: 448, h: 120, colors: ["#ffe66d", "#ffd60a", "#f77f00", "#fff3b0"], size: 8 });
      addCakeArea(92, { x: 0, y: 308, w: 314, h: 96, colors: ["#ffb703", "#ff9f1c", "#ffd60a", "#fff3b0"], size: 7.6 });
      addCakeLine(86, { x1: -276, y1: 168, x2: 276, y2: 168, jitter: 14, colors: ["#fff3b0", "#ffd60a", "#ffb703"], size: 8.5 });
      addCakeLine(72, { x1: -226, y1: 268, x2: 226, y2: 268, jitter: 12, colors: ["#fff3b0", "#ffd60a", "#ffb703"], size: 8 });
      addCakeLine(62, { x1: -164, y1: 350, x2: 164, y2: 350, jitter: 10, colors: ["#fff3b0", "#ffd60a", "#ffb703"], size: 7.6 });
      addCandle(-118);
      addCandle(0);
      addCandle(118);
      addCakeLine(34, { x1: -260, y1: 34, x2: 260, y2: 34, jitter: 10, colors: ["#ffd60a", "#ffb703", "#fff3b0"], size: 7.2 });
      addCakeLine(22, { x1: -210, y1: 342, x2: -148, y2: 342, jitter: 8, colors: ["#ffd60a", "#fff3b0"], size: 6.7 });
      addCakeLine(22, { x1: 148, y1: 342, x2: 210, y2: 342, jitter: 8, colors: ["#ffd60a", "#fff3b0"], size: 6.7 });
      addTextTargets(["Happy Birthday", "Minh Khanh"]);

      targets.forEach((target, i) => {
        const dust = document.createElement("span");
        const angle = i * 0.52;
        const side = i % 2 === 0 ? -1 : 1;
        const heightBand = i % 170;
        const heightProgress = heightBand / 169;
        const armPhase = (i % 4) * Math.PI * 0.5;
        const helixA = angle + armPhase + heightProgress * Math.PI * 7.4;
        const helixB = angle + armPhase + heightProgress * Math.PI * 9.8;
        const helixC = angle + armPhase + heightProgress * Math.PI * 12.2;
        const helixSpin1 = helixA + Math.PI * 1.25;
        const helixSpin2 = helixB + Math.PI * 1.55;
        const helixSpin3 = helixC + Math.PI * 1.85;
        const helixSpin4 = helixC + Math.PI * 3.15;
        const layer = 0.42 + ((i * 37) % 100) / 100 * 0.58;
        const funnelCurve = Math.pow(heightProgress, 0.72);
        const tornadoRadius = (18 + funnelCurve * 132) * layer * scale;
        const tornadoHeight = (70 + heightProgress * 520) * scale;
        const baseSpread = window.innerWidth * 0.18;
        const groundCenter = side * baseSpread;
        const vortexA = side * window.innerWidth * 0.3;
        const vortexB = side * window.innerWidth * 0.25;
        const vortexC = side * window.innerWidth * 0.12;

        dust.className = "dust";
        dust.style.setProperty("--color", target.color || layerColors[i % layerColors.length]);
        dust.style.setProperty("--size", (target.size * scale).toFixed(2));
        dust.style.setProperty("--x", groundCenter + (Math.random() - 0.5) * window.innerWidth * 0.24);
        dust.style.setProperty("--ground-y", 14 + Math.random() * 34);
        dust.style.setProperty("--ground-ring-x", groundCenter + Math.cos(angle) * (52 + Math.random() * 48) * scale);
        dust.style.setProperty("--ground-ring-y", (42 + Math.sin(angle) * 20) * scale);
        dust.style.setProperty("--vortex-x-a", vortexA + Math.cos(helixA) * tornadoRadius);
        dust.style.setProperty("--vortex-y-a", tornadoHeight + Math.sin(helixA) * 12 * scale);
        dust.style.setProperty("--vortex-x-spin-1", vortexA + Math.cos(helixSpin1) * tornadoRadius * 1.08);
        dust.style.setProperty("--vortex-y-spin-1", tornadoHeight + Math.sin(helixSpin1) * 20 * scale);
        dust.style.setProperty("--vortex-x-b", vortexB + Math.cos(helixB) * tornadoRadius * 0.96);
        dust.style.setProperty("--vortex-y-b", tornadoHeight + Math.sin(helixB) * 18 * scale);
        dust.style.setProperty("--vortex-x-spin-2", vortexB + Math.cos(helixSpin2) * tornadoRadius * 1.02);
        dust.style.setProperty("--vortex-y-spin-2", tornadoHeight + Math.sin(helixSpin2) * 24 * scale);
        dust.style.setProperty("--vortex-x-c", vortexC + Math.cos(helixC) * tornadoRadius * 0.82);
        dust.style.setProperty("--vortex-y-c", tornadoHeight + Math.sin(helixC) * 22 * scale);
        dust.style.setProperty("--vortex-x-spin-3", vortexC + Math.cos(helixSpin3) * tornadoRadius * 0.9);
        dust.style.setProperty("--vortex-y-spin-3", tornadoHeight + Math.sin(helixSpin3) * 26 * scale);
        dust.style.setProperty("--vortex-x-spin-4", vortexC + Math.cos(helixSpin4) * tornadoRadius * 0.72);
        dust.style.setProperty("--vortex-y-spin-4", tornadoHeight + Math.sin(helixSpin4) * 24 * scale);
        dust.style.setProperty("--near-merge-x", side * window.innerWidth * 0.055 + Math.cos(helixSpin4) * tornadoRadius * 0.45);
        dust.style.setProperty("--near-merge-y", (target.y * 0.58 + 118 + Math.sin(helixSpin4) * 22) * scale);
        dust.style.setProperty("--merge-x", target.x * scale * 0.12 + Math.sin(helixC) * 22 * scale);
        dust.style.setProperty("--merge-y", (target.y * 0.74 + 74 + Math.cos(helixC) * 18) * scale);
        dust.style.setProperty("--end-x", target.x * scale);
        dust.style.setProperty("--end-y", target.y * scale);
        dust.style.setProperty("--twinkle-x", ((Math.random() - 0.5) * 8 * scale).toFixed(2));
        dust.style.setProperty("--twinkle-y", ((Math.random() - 0.5) * 8 * scale).toFixed(2));
        dust.style.setProperty("--twinkle-scale", (1.06 + Math.random() * 0.1).toFixed(2));
        dust.style.setProperty("--twinkle-low", (0.68 + Math.random() * 0.18).toFixed(2));
        dust.style.setProperty("--twinkle-high", (0.9 + Math.random() * 0.1).toFixed(2));

        const explodeAngle = Math.atan2(target.y - 260, target.x || (Math.random() - 0.5));
        const explodeDistance = (120 + Math.random() * 210) * scale;
        dust.style.setProperty("--explode-x", Math.cos(explodeAngle) * explodeDistance);
        dust.style.setProperty("--explode-y", Math.sin(explodeAngle) * explodeDistance);
        dust.style.setProperty("--delay", Math.random() * 420);

        particleFragment.appendChild(dust);
      });

      for (let i = 0; i < 36; i++) {
        const burst = document.createElement("span");
        const angle = (Math.PI * 2 * i) / 36;
        const distance = (120 + Math.random() * 240) * scale;

        burst.className = "burst";
        burst.style.setProperty("--color", burstColors[i % burstColors.length]);
        burst.style.setProperty("--burst-x", Math.cos(angle) * distance);
        burst.style.setProperty("--burst-y", Math.sin(angle) * distance);

        particleFragment.appendChild(burst);
      }

      intro.appendChild(particleFragment);
    }

    function showLetter() {
      const mainPage = document.getElementById("mainPage");
      const letterPage = document.getElementById("letterPage");
      const target = document.getElementById("letterText");

      clearConfetti();
      mainPage.style.display = "none";
      letterPage.style.display = "flex";
      letterPage.classList.add("intro-playing");
      letterPage.classList.remove("final-reveal");
      target.textContent = "";
      target.classList.add("typing");
      createCakeIntroParticles();

      const letter = `On this special day, I hope the world showers you with all the happiness and love you truly deserve.
You're an incredible person who brings light wherever you go, and today is just another reminder of how amazing you are.
Have an absolutely wonderful birthday filled with all the things that make you happiest.

✨ Yours truly,
- KHANH TOAN ❤️`;

      let index = 0;
      const speed = 40;
      const tokens = letter.match(/\n|[^\s\n]+|[ \t]+/g) || [];

      function typeText() {
        if (index < tokens.length) {
          const token = tokens[index];

          if (token === "\n") {
            target.appendChild(document.createElement("br"));
          } else if (token.trim() === "") {
            const spaceElement = document.createElement("span");
            spaceElement.className = "letter-space";
            spaceElement.textContent = token;
            target.appendChild(spaceElement);
          } else {
            const wordElement = document.createElement("span");
            wordElement.className = "letter-word";

            if (token.includes("❤")) {
              wordElement.classList.add("red-heart");
            }

            const letters = Array.from(token);

            for (let i = 0; i < letters.length; i++) {
              const charElement = document.createElement("span");

              charElement.className = "letter-char";
              charElement.textContent = letters[i];
              charElement.style.animationDelay = i * 16 + "ms";

              if (i === 0 || i === letters.length - 1) {
                charElement.classList.add("spark");
              }

              wordElement.appendChild(charElement);
            }

            target.appendChild(wordElement);
          }

          index++;
          setTimeout(typeText, speed);
          return;
        }

        target.classList.remove("typing");
      }

      setTimeout(() => {
        letterPage.classList.remove("intro-playing");
        letterPage.classList.add("final-reveal");
        createConfetti();
        setTimeout(typeText, 850);
      }, 22000);
    }
  </script>
</body>
</html>
