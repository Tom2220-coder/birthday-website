<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      overflow-x: hidden;
    }

    body {
      background: #111;
    }

    button {
      font: inherit;
    }

    .page {
      position: relative;
      min-height: 100svh;
      overflow: hidden;
      isolation: isolate;
    }

    .background-img,
    #letterPage::before {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .main-content {
      min-height: 100svh;
      display: grid;
      grid-template-rows: 1fr auto 1fr;
      place-items: center;
      padding: clamp(20px, 5vw, 56px);
      text-align: center;
    }

    #mainPage {
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 192, 218, 0.16), transparent 28%),
        radial-gradient(circle at 82% 22%, rgba(255, 214, 10, 0.14), transparent 30%),
        radial-gradient(circle at 50% 84%, rgba(54, 230, 255, 0.11), transparent 34%),
        #111;
    }

    #mainPage::before,
    #mainPage::after {
      content: "";
      position: absolute;
      inset: -18%;
      pointer-events: none;
      z-index: 1;
      opacity: 0.82;
      mix-blend-mode: screen;
      will-change: transform, opacity;
    }

    #mainPage::before {
      background:
        conic-gradient(
          from 20deg at 50% 50%,
          transparent 0deg,
          rgba(255, 192, 218, 0.13) 42deg,
          transparent 86deg,
          rgba(255, 214, 10, 0.1) 142deg,
          transparent 208deg,
          rgba(54, 230, 255, 0.11) 272deg,
          transparent 360deg
        );
      filter: blur(24px);
      animation: openingAuroraTurn 18000ms linear infinite;
    }

    #mainPage::after {
      background:
        radial-gradient(ellipse at 50% 62%, rgba(255, 246, 178, 0.22), transparent 42%),
        radial-gradient(ellipse at 24% 48%, rgba(255, 92, 138, 0.14), transparent 34%),
        radial-gradient(ellipse at 76% 48%, rgba(54, 230, 255, 0.12), transparent 34%);
      filter: blur(16px);
      animation: openingGlowBreath 7600ms ease-in-out infinite alternate;
    }

    #mainPage.opening-out .birthday-title,
    #mainPage.opening-out .plane-banner,
    #mainPage.opening-out .open-letter-btn {
      animation: openingPageExit 1150ms cubic-bezier(.18, .74, .2, 1) forwards;
    }

    .opening-stage,
    .open-click-stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 4;
      contain: layout paint style;
    }

    .open-click-stage {
      z-index: 24;
    }

    .opening-dot,
    .opening-heart,
    .opening-diamond,
    .opening-moon,
    .opening-lantern,
    .opening-comet,
    .opening-title-spark,
    .opening-title-orbit,
    .opening-title-glint,
    .button-burst,
    .button-ripple,
    .button-flare {
      position: fixed;
      left: 0;
      top: 0;
      pointer-events: none;
      will-change: transform, opacity;
      contain: layout paint style;
    }

    .opening-dot {
      width: calc(var(--size) * 1px);
      height: calc(var(--size) * 1px);
      border-radius: 50%;
      color: var(--color);
      background:
        radial-gradient(circle at 32% 28%, #ffffff, currentColor 46%, transparent 76%);
      opacity: 0;
      box-shadow:
        0 0 5px currentColor,
        0 0 14px rgba(255, 246, 178, 0.3);
      transform:
        translate(calc(var(--x) * 1px), calc(var(--y) * 1px))
        scale(0.24);
      animation: openingDotFloat calc(var(--dur) * 1ms) ease-in-out infinite;
      animation-delay: calc(var(--delay) * -1ms);
      z-index: 2;
    }

    .opening-heart {
      width: calc(var(--size) * 1px);
      height: calc(var(--size) * 1px);
      color: var(--color);
      opacity: 0;
      transform:
        translate(calc(var(--x) * 1px), calc(var(--y) * 1px))
        rotate(-45deg)
        scale(0.28);
      animation: openingHeartSway calc(var(--dur) * 1ms) ease-in-out infinite;
      animation-delay: calc(var(--delay) * -1ms);
      z-index: 3;
    }

    .opening-heart::before,
    .opening-heart::after,
    .opening-heart {
      background: currentColor;
    }

    .opening-heart::before,
    .opening-heart::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    .opening-heart::before {
      left: 50%;
      top: 0;
    }

    .opening-heart::after {
      left: 0;
      top: -50%;
    }

    .opening-diamond {
      width: calc(var(--size) * 1px);
      height: calc(var(--size) * 1px);
      border-radius: 22%;
      color: var(--color);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.92), currentColor 54%, rgba(255, 255, 255, 0.24));
      opacity: 0;
      box-shadow: 0 0 10px currentColor;
      transform:
        translate(calc(var(--x) * 1px), calc(var(--y) * 1px))
        rotate(45deg)
        scale(0.3);
      animation: openingDiamondSpin calc(var(--dur) * 1ms) ease-in-out infinite;
      animation-delay: calc(var(--delay) * -1ms);
      z-index: 3;
    }

    .opening-moon {
      width: calc(var(--size) * 1px);
      height: calc(var(--size) * 1px);
      border-radius: 50%;
      opacity: 0;
      background:
        radial-gradient(circle at 42% 42%, rgba(255, 255, 255, 0.95), rgba(255, 246, 178, 0.64) 34%, transparent 66%);
      box-shadow:
        0 0 18px rgba(255, 246, 178, 0.46),
        0 0 42px rgba(255, 192, 218, 0.16);
      transform:
        translate(calc(var(--x) * 1px), calc(var(--y) * 1px))
        scale(0.4);
      animation: openingMoonPulse calc(var(--dur) * 1ms) ease-in-out infinite;
      animation-delay: calc(var(--delay) * -1ms);
      z-index: 1;
    }

    .opening-lantern {
      width: calc(var(--w) * 1px);
      height: calc(var(--h) * 1px);
      border-radius: 999px 999px 52% 52%;
      opacity: 0;
      background:
        radial-gradient(circle at 50% 32%, rgba(255, 255, 255, 0.92), transparent 18%),
        linear-gradient(180deg, rgba(255, 192, 218, 0.9), rgba(255, 92, 138, 0.42) 58%, rgba(255, 214, 10, 0.3));
      box-shadow:
        inset 0 0 14px rgba(255, 255, 255, 0.34),
        0 0 18px rgba(255, 192, 218, 0.38);
      transform:
        translate(calc(var(--x) * 1px), calc(var(--y) * 1px))
        rotate(calc(var(--rot) * 1deg))
        scale(0.62);
      animation: openingLanternRise calc(var(--dur) * 1ms) ease-in-out infinite;
      animation-delay: calc(var(--delay) * -1ms);
      z-index: 2;
    }

    .opening-lantern::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -8px;
      width: 2px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 246, 178, 0.72);
      transform: translateX(-50%);
      box-shadow: 0 0 8px rgba(255, 214, 10, 0.5);
    }

    .opening-comet {
      width: calc(var(--size) * 1px);
      height: calc(var(--size) * 1px);
      border-radius: 50%;
      color: var(--color);
      background:
        radial-gradient(circle at 30% 25%, #ffffff, currentColor 48%, transparent 78%);
      opacity: 0;
      box-shadow:
        0 0 7px currentColor,
        0 0 18px rgba(255, 246, 178, 0.34);
      transform:
        translate(calc(var(--x) * 1px), calc(var(--y) * 1px))
        rotate(calc(var(--angle) * 1deg))
        scale(0.2);
      animation: openingCometSweep calc(var(--dur) * 1ms) cubic-bezier(.2, .72, .16, 1) infinite;
      animation-delay: calc(var(--delay) * -1ms);
      z-index: 2;
    }

    .opening-comet::after {
      content: "";
      position: absolute;
      top: 50%;
      right: 55%;
      width: calc(var(--tail) * 1px);
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.48), currentColor);
      opacity: 0.5;
      transform: translateY(-50%);
    }

    .opening-title-spark {
      width: calc(var(--size) * 1px);
      height: calc(var(--size) * 1px);
      border-radius: 50%;
      color: var(--color);
      background:
        radial-gradient(circle at 32% 28%, #ffffff, currentColor 44%, transparent 78%);
      opacity: 0;
      box-shadow:
        0 0 6px currentColor,
        0 0 16px rgba(255, 192, 218, 0.34);
      transform:
        translate(calc(var(--x) * 1px), calc(var(--y) * 1px))
        scale(0.24);
      animation: openingTitleSparkDance calc(var(--dur) * 1ms) ease-in-out infinite;
      animation-delay: calc(var(--delay) * -1ms);
      z-index: 5;
    }

    .opening-title-orbit {
      width: calc(var(--size) * 1px);
      height: calc(var(--size) * 1px);
      border-radius: 999px;
      color: var(--color);
      background:
        radial-gradient(circle at 28% 28%, #ffffff, currentColor 46%, transparent 76%);
      opacity: 0;
      box-shadow:
        0 0 7px currentColor,
        0 0 18px rgba(255, 214, 10, 0.28);
      transform:
        translate(calc(var(--x) * 1px), calc(var(--y) * 1px))
        rotate(calc(var(--angle) * 1deg))
        scale(0.28);
      animation: openingTitleOrbit calc(var(--dur) * 1ms) cubic-bezier(.2, .72, .18, 1) infinite;
      animation-delay: calc(var(--delay) * -1ms);
      z-index: 5;
    }

    .opening-title-orbit::after {
      content: "";
      position: absolute;
      top: 50%;
      right: 58%;
      width: calc(var(--tail) * 1px);
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.44), currentColor);
      opacity: 0.42;
      transform: translateY(-50%);
    }

    .opening-title-glint {
      width: calc(var(--w) * 1px);
      height: 3px;
      border-radius: 999px;
      background:
        linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.94), rgba(255, 192, 218, 0.72), transparent);
      opacity: 0;
      transform:
        translate(calc(var(--x) * 1px), calc(var(--y) * 1px))
        translate(-50%, -50%)
        rotate(calc(var(--angle) * 1deg))
        scaleX(0.18);
      animation: openingTitleGlint calc(var(--dur) * 1ms) ease-in-out infinite;
      animation-delay: calc(var(--delay) * -1ms);
      z-index: 5;
    }

    .button-burst {
      width: calc(var(--size) * 1px);
      height: calc(var(--size) * 1px);
      border-radius: 50%;
      color: var(--color);
      background:
        radial-gradient(circle at 30% 25%, #ffffff, currentColor 44%, transparent 76%);
      box-shadow:
        0 0 7px currentColor,
        0 0 16px rgba(255, 246, 178, 0.42);
      opacity: 0;
      transform:
        translate(calc(var(--x) * 1px), calc(var(--y) * 1px))
        scale(0.22);
      animation: buttonBurstFly 1280ms cubic-bezier(.15, .7, .2, 1) forwards;
      animation-delay: calc(var(--delay) * 1ms);
      z-index: 30;
    }

    .button-ripple {
      width: calc(var(--size) * 1px);
      height: calc(var(--size) * 1px);
      border-radius: 50%;
      border: 2px solid rgba(255, 246, 178, 0.78);
      box-shadow:
        0 0 22px rgba(255, 214, 10, 0.34),
        inset 0 0 18px rgba(255, 192, 218, 0.18);
      opacity: 0;
      transform:
        translate(calc(var(--x) * 1px), calc(var(--y) * 1px))
        translate(-50%, -50%)
        scale(0.12);
      animation: buttonRippleOpen 1100ms ease-out forwards;
      animation-delay: calc(var(--delay) * 1ms);
      z-index: 28;
    }

    .button-flare {
      width: calc(var(--w) * 1px);
      height: 3px;
      border-radius: 999px;
      background:
        linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.88), rgba(255, 214, 10, 0.72), transparent);
      opacity: 0;
      transform:
        translate(calc(var(--x) * 1px), calc(var(--y) * 1px))
        translate(-50%, -50%)
        rotate(calc(var(--angle) * 1deg))
        scaleX(0.16);
      animation: buttonFlareCut 980ms ease-out forwards;
      animation-delay: calc(var(--delay) * 1ms);
      z-index: 29;
    }

    .birthday-title {
      align-self: end;
      margin: 0 0 clamp(16px, 5vh, 48px);
      color: #ffc0da;
      font-family: "Pacifico", "Segoe Script", cursive;
      font-size: clamp(3rem, 13vw, 8.5rem);
      font-style: italic;
      line-height: 0.95;
      position: relative;
      text-shadow:
        0 4px 14px rgba(0, 0, 0, 0.75),
        0 0 16px rgba(255, 192, 218, 0.34);
      animation: titleSoftFloat 4600ms ease-in-out infinite;
      z-index: 6;
    }

    .birthday-title::before,
    .birthday-title::after {
      content: "";
      position: absolute;
      left: 50%;
      pointer-events: none;
      transform: translateX(-50%);
    }

    .birthday-title::before {
      top: 50%;
      width: 112%;
      height: 92%;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at center, rgba(255, 192, 218, 0.24), rgba(255, 214, 10, 0.08) 46%, transparent 72%);
      filter: blur(18px);
      opacity: 0.62;
      z-index: -1;
      animation: titleAuraPulse 4200ms ease-in-out infinite alternate;
    }

    .birthday-title::after {
      bottom: -0.18em;
      width: 78%;
      height: 0.14em;
      border-radius: 999px;
      background:
        linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.74), rgba(255, 192, 218, 0.8), transparent);
      filter: blur(0.5px);
      opacity: 0.72;
      animation: titleUnderlineGlow 3600ms ease-in-out infinite;
    }

    .birthday-title span {
      display: block;
      color: #ffc0da;
      text-shadow:
        0 4px 14px rgba(0, 0, 0, 0.75),
        0 0 12px rgba(255, 192, 218, 0.5),
        0 0 28px rgba(255, 214, 10, 0.16);
    }

    .plane-banner {
      position: absolute;
      top: 46%;
      left: 0;
      display: flex;
      align-items: center;
      width: max-content;
      animation: fly 12s linear infinite;
      z-index: 3;
    }

    .banner {
      max-width: min(72vw, 720px);
      padding: clamp(8px, 1.8vw, 14px) clamp(16px, 5vw, 40px);
      border: 2px solid #e91e63;
      border-radius: 999px;
      background-color: rgba(255, 255, 255, 0.95);
      color: #e91e63;
      font-size: clamp(0.9rem, 2.2vw, 1.35rem);
      font-weight: 800;
      line-height: 1.35;
      white-space: nowrap;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.2);
    }

    .rope {
      width: clamp(36px, 9vw, 80px);
      height: 2px;
      margin-left: -2px;
      background-color: #555;
    }

    .plane-img {
      width: clamp(76px, 15vw, 140px);
      transform: translateY(4px);
    }

    .open-letter-btn {
      align-self: start;
      min-width: min(78vw, 220px);
      margin-top: clamp(80px, 22vh, 220px);
      padding: 0.85rem 1.5rem;
      border: 2px solid #e91e63;
      border-radius: 999px;
      background-color: rgba(255, 255, 255, 0.96);
      color: #e91e63;
      font-size: clamp(1rem, 2.4vw, 1.25rem);
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
      position: relative;
      overflow: hidden;
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
      z-index: 5;
    }

    .open-letter-btn::before,
    .open-letter-btn::after {
      content: "";
      position: absolute;
      inset: -40%;
      pointer-events: none;
      opacity: 0;
    }

    .open-letter-btn::before {
      background:
        conic-gradient(from 0deg, transparent, rgba(255, 214, 10, 0.46), transparent, rgba(255, 192, 218, 0.5), transparent);
      animation: openButtonHalo 3600ms linear infinite;
      opacity: 0.68;
      mix-blend-mode: screen;
    }

    .open-letter-btn::after {
      inset: 0;
      background:
        linear-gradient(110deg, transparent 0%, rgba(255, 255, 255, 0.88) 44%, transparent 58%);
      transform: translateX(-140%);
      animation: openButtonSheen 2600ms ease-in-out infinite;
      opacity: 0.45;
    }

    .open-letter-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
    }

    .open-letter-btn:active {
      transform: translateY(1px) scale(0.98);
      filter: brightness(1.08);
    }

    .confetti {
      position: fixed;
      top: -20px;
      border-radius: 50%;
      opacity: 0.75;
      animation: fall linear infinite;
      pointer-events: none;
      z-index: 10;
    }

    #letterPage {
      display: none;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 4vw, 48px);
    }

    #letterPage.intro-playing .best-wishes-text,
    #letterPage.intro-playing .letter-layout {
      opacity: 0;
      pointer-events: none;
    }

    #letterPage::before {
      content: "";
      background: url("kk.jpg") center / cover no-repeat;
    }

    .letter-layout {
      width: min(1180px, 100%);
      display: grid;
      grid-template-columns: minmax(110px, 180px) minmax(0, 560px) minmax(110px, 180px);
      gap: clamp(12px, 3vw, 36px);
      align-items: start;
      justify-content: center;
      margin-top: clamp(76px, 14vh, 140px);
      opacity: 1;
      transition: opacity 900ms ease;
    }

    .cake-intro {
      --cake-scale: 1;
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      pointer-events: none;
      z-index: 6;
      background:
        radial-gradient(circle at 50% 70%, rgba(255, 226, 96, 0.28), transparent 34%),
        radial-gradient(circle at 25% 58%, rgba(255, 90, 160, 0.16), transparent 30%),
        radial-gradient(circle at 75% 58%, rgba(80, 220, 255, 0.16), transparent 30%),
        linear-gradient(180deg, rgba(11, 6, 26, 0.1), rgba(11, 6, 26, 0.54));
    }

    #letterPage.intro-playing .cake-intro {
      display: flex;
    }

    .cake-intro::before,
    .cake-intro::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 6%;
      width: min(92vw, 960px);
      height: min(82vw, 760px);
      border-radius: 50%;
      opacity: 0;
      transform: translate(-50%, 18%) scale(0.72);
      pointer-events: none;
      mix-blend-mode: screen;
      will-change: transform, opacity;
    }

    .cake-intro::before {
      background:
        repeating-conic-gradient(
          from 0deg,
          rgba(255, 246, 178, 0.3) 0deg 6deg,
          rgba(255, 165, 64, 0.08) 6deg 13deg,
          transparent 13deg 22deg
        );
      filter: blur(12px);
      animation: introAura 22000ms ease-in-out forwards;
    }

    .cake-intro::after {
      width: min(80vw, 720px);
      height: min(58vw, 430px);
      background:
        radial-gradient(ellipse at center, rgba(255, 226, 96, 0.42), rgba(255, 120, 60, 0.1) 44%, transparent 68%);
      filter: blur(18px);
      animation: cakeStageGlow 22000ms ease-in-out forwards;
    }

    .spark-star,
    .icing-dot,
    .vortex-orb,
    .ambient-speck,
    .comet-dot,
    .halo-pulse,
    .cake-shimmer,
    .cake-orbit-dot,
    .cake-puff,
    .vortex-spark,
    .text-anchor,
    .text-sweep,
    .heart-spark,
    .heart-ring,
    .firework-dot,
    .firework-core,
    .side-figure-dot,
    .side-figure-glow {
      position: absolute;
      left: 50%;
      bottom: 0;
      pointer-events: none;
      will-change: transform, opacity;
      contain: layout paint style;
    }

    .vortex-orb {
      width: calc(var(--size) * 1px);
      height: calc(var(--size) * 1px);
      border-radius: 50%;
      color: var(--color);
      background:
        radial-gradient(circle at 34% 30%, rgba(255, 255, 255, 0.95), currentColor 42%, rgba(255, 159, 28, 0.34) 76%, transparent 78%);
      opacity: 0;
      box-shadow:
        0 0 5px currentColor,
        0 0 11px rgba(255, 214, 10, 0.42);
      transform:
        translate(calc(var(--start-x) * 1px), calc(var(--start-y) * -1px))
        scale(0.18);
      animation: vortexOrbDance 22000ms cubic-bezier(.17, .7, .18, 1) forwards;
      animation-delay: calc(var(--delay) * 1ms);
      z-index: 2;
    }

    .vortex-orb.deep {
      filter: blur(0.2px) saturate(0.82);
      opacity: 0;
      z-index: 1;
    }

    .vortex-orb.bright {
      background:
        radial-gradient(circle at 35% 28%, #ffffff, currentColor 38%, rgba(255, 255, 255, 0.2) 72%, transparent 76%);
      box-shadow:
        0 0 7px currentColor,
        0 0 16px rgba(255, 246, 178, 0.62);
      z-index: 4;
    }

    .ambient-speck {
      width: calc(var(--size) * 1px);
      height: calc(var(--size) * 1px);
      border-radius: 50%;
      color: var(--color);
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.92), currentColor 44%, transparent 74%);
      opacity: 0;
      box-shadow: 0 0 6px currentColor;
      transform:
        translate(calc(var(--start-x) * 1px), calc(var(--start-y) * -1px))
        scale(0.2);
      animation: ambientSpeckDrift 22000ms ease-in-out forwards;
      animation-delay: calc(var(--delay) * 1ms);
      z-index: 1;
    }

    .comet-dot {
      width: calc(var(--size) * 1px);
      height: calc(var(--size) * 1px);
      border-radius: 50%;
      color: var(--color);
      background:
        radial-gradient(circle at 34% 28%, #ffffff, currentColor 48%, transparent 76%);
      opacity: 0;
      box-shadow:
        0 0 5px currentColor,
        0 0 10px rgba(255, 214, 10, 0.42);
      transform:
        translate(calc(var(--start-x) * 1px), calc(var(--start-y) * -1px))
        scale(0.2);

    .best-wishes-text::before,

      content: "";

      left: 50%;

      height: 5px;
      border-radius: 999px;
      background:
        linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.88), rgba(255, 214, 10, 0.78), transparent);

      animation: wishUnderlineShine 3600ms ease-in-out infinite;

    function createOpeningPageEffects() {

      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const saveData = navigator.connection?.saveData;
      const width = window.innerWidth;
      const height = window.innerHeight;
      const phoneMode = width < 620;
      const tabletMode = width < 980;
      const lowPower = saveData || navigator.hardwareConcurrency <= 4;
      const quality = reducedMotion

          ? "low"

            ? "phone"
            : tabletMode
              ? "tablet"
              : "desktop";
      const counts = {
        minimal: { dots: 6, hearts: 0, diamonds: 0, moons: 1, lanterns: 0, comets: 0, titleSparks: 4, titleOrbits: 0, titleGlints: 0 },
        low: { dots: 14, hearts: 2, diamonds: 3, moons: 1, lanterns: 1, comets: 1, titleSparks: 10, titleOrbits: 2, titleGlints: 1 },
        phone: { dots: 22, hearts: 3, diamonds: 5, moons: 1, lanterns: 1, comets: 1, titleSparks: 16, titleOrbits: 3, titleGlints: 1 },
        tablet: { dots: 42, hearts: 7, diamonds: 9, moons: 2, lanterns: 3, comets: 3, titleSparks: 28, titleOrbits: 6, titleGlints: 2 },
        desktop: { dots: 72, hearts: 12, diamonds: 14, moons: 3, lanterns: 5, comets: 5, titleSparks: 46, titleOrbits: 10, titleGlints: 3 },

        el.style.setProperty("--sway-x", rand(-110, 110) * drift);

      };

      stage.innerHTML = "";

          const progress = counts.titleSparks === 1 ? 0 : i / (counts.titleSparks - 1);
          const side = i % 2 === 0 ? -1 : 1;

          spark.style.setProperty("--y", (laneY + rand(-10, 10)).toFixed(2));
          spark.style.setProperty("--hop-x", (side * rand(10, phoneMode ? 28 : 46)).toFixed(2));
          spark.style.setProperty("--hop-y", rand(-28, 18).toFixed(2));
          spark.style.setProperty("--drift-x", (side * rand(20, phoneMode ? 52 : 86)).toFixed(2));
          spark.style.setProperty("--drift-y", rand(-44, 26).toFixed(2));
          spark.style.setProperty("--delay", rand(0, 6400).toFixed(2));
          spark.style.setProperty("--dur", rand(phoneMode ? 5200 : 6200, phoneMode ? 9800 : 12200).toFixed(2));
          fragment.appendChild(spark);

        for (let i = 0; i < counts.titleOrbits; i++) {
          const orbit = document.createElement("span");
          const angle = (Math.PI * 2 * i) / Math.max(1, counts.titleOrbits) + Math.random() * 0.3;
          const radiusX = titleRect.width * (0.42 + Math.random() * 0.14);
          const radiusY = titleRect.height * (0.36 + Math.random() * 0.16);

          orbit.className = "opening-title-orbit";
          orbit.style.setProperty("--color", colors[(i + 1) % colors.length]);
          orbit.style.setProperty("--size", rand(phoneMode ? 3 : 3.4, phoneMode ? 6.6 : 8.8).toFixed(2));
          orbit.style.setProperty("--tail", rand(phoneMode ? 10 : 14, phoneMode ? 24 : 34).toFixed(2));
          orbit.style.setProperty("--x", (titleCenterX + Math.cos(angle) * radiusX).toFixed(2));
          orbit.style.setProperty("--y", (titleCenterY + Math.sin(angle) * radiusY).toFixed(2));
          orbit.style.setProperty("--arc-a-x", (Math.cos(angle + 0.9) * radiusX * 0.38).toFixed(2));
          orbit.style.setProperty("--arc-a-y", (Math.sin(angle + 0.9) * radiusY * 0.46).toFixed(2));
          orbit.style.setProperty("--arc-b-x", (Math.cos(angle + 1.8) * radiusX * 0.56).toFixed(2));
          orbit.style.setProperty("--arc-b-y", (Math.sin(angle + 1.8) * radiusY * 0.62).toFixed(2));
          orbit.style.setProperty("--arc-c-x", (Math.cos(angle + 2.5) * radiusX * 0.32).toFixed(2));

          orbit.style.setProperty("--delay", rand(0, 7200).toFixed(2));
          orbit.style.setProperty("--dur", rand(phoneMode ? 6800 : 7600, phoneMode ? 11800 : 14600).toFixed(2));
          fragment.appendChild(orbit);
        }

        for (let i = 0; i < counts.titleGlints; i++) {
          const glint = document.createElement("span");
          const row = i % 2 === 0 ? 0.32 : 0.68;
          const direction = i % 2 === 0 ? 1 : -1;

          glint.style.setProperty("--w", rand(phoneMode ? 86 : 130, phoneMode ? 140 : 220).toFixed(2));
          glint.style.setProperty("--x", (titleRect.left + titleRect.width * (direction > 0 ? 0.2 : 0.78)).toFixed(2));
          glint.style.setProperty("--y", (titleRect.top + titleRect.height * row).toFixed(2));
          glint.style.setProperty("--shift-x", (direction * titleRect.width * 0.25).toFixed(2));
          glint.style.setProperty("--shift-y", rand(-10, 10).toFixed(2));
          glint.style.setProperty("--end-x", (direction * titleRect.width * 0.55).toFixed(2));
          glint.style.setProperty("--end-y", rand(-18, 18).toFixed(2));
          glint.style.setProperty("--angle", (direction > 0 ? rand(-8, 4) : rand(176, 188)).toFixed(2));
          glint.style.setProperty("--delay", (i * 1200 + rand(0, 900)).toFixed(2));

      for (let i = 0; i < counts.dots; i++) {

    function createOpenLetterBurst(button) {
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const rect = button.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const stage = document.createElement("div");
      const fragment = document.createDocumentFragment();
      const phoneMode = window.innerWidth < 620;
      const colors = ["#ffffff", "#ffd60a", "#ffc0da", "#ff5c8a", "#36e6ff", "#fff3b0"];
      const burstCount = reducedMotion ? 6 : phoneMode ? 18 : 42;
      const flareCount = reducedMotion ? 1 : phoneMode ? 3 : 6;
      const rippleCount = reducedMotion ? 1 : phoneMode ? 1 : 2;

      stage.className = "open-click-stage";

      for (let i = 0; i < rippleCount; i++) {
        const ripple = document.createElement("span");
        ripple.className = "button-ripple";
        ripple.style.setProperty("--size", (Math.max(rect.width, rect.height) * (2.2 + i * 1.2)).toFixed(2));
        ripple.style.setProperty("--x", centerX.toFixed(2));
        ripple.style.setProperty("--y", centerY.toFixed(2));
        ripple.style.setProperty("--delay", (i * 90).toFixed(2));
        fragment.appendChild(ripple);
      }

      for (let i = 0; i < flareCount; i++) {
        const flare = document.createElement("span");
        const angle = (Math.PI * 2 * i) / flareCount + Math.random() * 0.25;
        const distance = (phoneMode ? 70 : 110) + Math.random() * (phoneMode ? 70 : 120);
        flare.className = "button-flare";
        flare.style.setProperty("--w", ((phoneMode ? 90 : 140) + Math.random() * 90).toFixed(2));
        flare.style.setProperty("--x", centerX.toFixed(2));
        flare.style.setProperty("--y", centerY.toFixed(2));
        flare.style.setProperty("--shift-x", (Math.cos(angle) * distance * 0.32).toFixed(2));
        flare.style.setProperty("--shift-y", (Math.sin(angle) * distance * 0.32).toFixed(2));
        flare.style.setProperty("--end-x", (Math.cos(angle) * distance).toFixed(2));
        flare.style.setProperty("--end-y", (Math.sin(angle) * distance).toFixed(2));
        flare.style.setProperty("--angle", (angle * 180 / Math.PI).toFixed(2));
        flare.style.setProperty("--delay", (i * 34).toFixed(2));
        fragment.appendChild(flare);
      }

      for (let i = 0; i < burstCount; i++) {
        const burst = document.createElement("span");
        const angle = (Math.PI * 2 * i) / burstCount + Math.random() * 0.34;
        const distance = (phoneMode ? 58 : 88) + Math.random() * (phoneMode ? 150 : 240);
        const endDistance = distance + (phoneMode ? 40 : 90) + Math.random() * (phoneMode ? 80 : 150);
        burst.className = "button-burst";
        burst.style.setProperty("--color", colors[i % colors.length]);
        burst.style.setProperty("--size", ((phoneMode ? 3 : 3.4) + Math.random() * (phoneMode ? 5 : 7)).toFixed(2));
        burst.style.setProperty("--x", (centerX + (Math.random() - 0.5) * rect.width * 0.5).toFixed(2));
        burst.style.setProperty("--y", (centerY + (Math.random() - 0.5) * rect.height * 0.6).toFixed(2));
        burst.style.setProperty("--burst-x", (Math.cos(angle) * distance).toFixed(2));
        burst.style.setProperty("--burst-y", (Math.sin(angle) * distance).toFixed(2));
        burst.style.setProperty("--end-x", (Math.cos(angle) * endDistance).toFixed(2));
        burst.style.setProperty("--end-y", (Math.sin(angle) * endDistance - 30).toFixed(2));
        burst.style.setProperty("--rot", (-180 + Math.random() * 360).toFixed(2));
        burst.style.setProperty("--delay", (Math.random() * 120).toFixed(2));
        fragment.appendChild(burst);
      }

      stage.appendChild(fragment);
      document.body.appendChild(stage);
      setTimeout(() => stage.remove(), 1700);
    }

    function cleanupLetterPageEffects() {
      document.querySelectorAll(".letter-float-spark, .letter-glow-orb, .letter-page-glint")
        .forEach((effect) => effect.remove());
    }

    function createLetterPageEffects() {
      cleanupLetterPageEffects();

      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (reducedMotion) return;

      const title = document.querySelector(".best-wishes-text");
      const note = document.querySelector(".note");
      const width = window.innerWidth;
      const height = window.innerHeight;
      const phoneMode = width < 620 || window.matchMedia("(pointer: coarse)").matches;
      const colors = ["#ffffff", "#ffd60a", "#fff3b0", "#ffb703", "#ffc0da"];
      const sparkCount = phoneMode ? 18 : 42;
      const orbCount = phoneMode ? 2 : 5;
      const glintCount = phoneMode ? 0 : 4;
      const fragment = document.createDocumentFragment();
      const rand = (min, max) => min + Math.random() * (max - min);
      const titleRect = title?.getBoundingClientRect();
      const noteRect = note?.getBoundingClientRect();

      if (titleRect && titleRect.width > 0) {
        for (let i = 0; i < Math.ceil(sparkCount * 0.45); i++) {
          const spark = document.createElement("span");
          const side = i % 2 === 0 ? -1 : 1;

          spark.className = "letter-float-spark";
          spark.style.setProperty("--color", colors[i % colors.length]);
          spark.style.setProperty("--size", rand(phoneMode ? 2.4 : 3, phoneMode ? 5.4 : 7.2).toFixed(2));
          spark.style.setProperty("--x", rand(titleRect.left, titleRect.right).toFixed(2));
          spark.style.setProperty("--y", rand(titleRect.top + titleRect.height * 0.18, titleRect.bottom).toFixed(2));
          spark.style.setProperty("--mid-x", (side * rand(12, phoneMode ? 32 : 56)).toFixed(2));
          spark.style.setProperty("--mid-y", rand(-28, 18).toFixed(2));
          spark.style.setProperty("--end-x", (side * rand(28, phoneMode ? 58 : 96)).toFixed(2));
          spark.style.setProperty("--end-y", rand(-48, 28).toFixed(2));
          spark.style.setProperty("--delay", rand(0, 6200).toFixed(2));
          spark.style.setProperty("--dur", rand(phoneMode ? 5200 : 6200, phoneMode ? 9200 : 11800).toFixed(2));
          fragment.appendChild(spark);
        }
      }

      if (noteRect && noteRect.width > 0) {
        for (let i = 0; i < Math.floor(sparkCount * 0.55); i++) {
          const spark = document.createElement("span");
          const edge = i % 4;
          const x = edge === 0
            ? rand(noteRect.left - 54, noteRect.left + 24)
            : edge === 1
              ? rand(noteRect.right - 24, noteRect.right + 54)
              : rand(noteRect.left + 20, noteRect.right - 20);
          const y = edge < 2
            ? rand(noteRect.top + 16, noteRect.bottom - 16)
            : (edge === 2 ? rand(noteRect.top - 42, noteRect.top + 18) : rand(noteRect.bottom - 18, noteRect.bottom + 42));

          spark.className = "letter-float-spark";
          spark.style.setProperty("--color", colors[(i + 2) % colors.length]);
          spark.style.setProperty("--size", rand(phoneMode ? 2 : 2.6, phoneMode ? 4.8 : 6.8).toFixed(2));
          spark.style.setProperty("--x", x.toFixed(2));
          spark.style.setProperty("--y", y.toFixed(2));
          spark.style.setProperty("--mid-x", rand(-36, 36).toFixed(2));
          spark.style.setProperty("--mid-y", rand(-32, 24).toFixed(2));
          spark.style.setProperty("--end-x", rand(-70, 70).toFixed(2));
          spark.style.setProperty("--end-y", rand(-54, 42).toFixed(2));
          spark.style.setProperty("--delay", rand(0, 7600).toFixed(2));
          spark.style.setProperty("--dur", rand(phoneMode ? 5800 : 7000, phoneMode ? 9800 : 12800).toFixed(2));
          fragment.appendChild(spark);
        }

        for (let i = 0; i < orbCount; i++) {
          const orb = document.createElement("span");
          const side = i % 2 === 0 ? -1 : 1;

          orb.className = "letter-glow-orb";
          orb.style.setProperty("--size", rand(phoneMode ? 72 : 110, phoneMode ? 130 : 210).toFixed(2));
          orb.style.setProperty("--x", (noteRect.left + noteRect.width * (side < 0 ? 0.2 : 0.8)).toFixed(2));
          orb.style.setProperty("--y", rand(noteRect.top + noteRect.height * 0.18, noteRect.bottom - noteRect.height * 0.18).toFixed(2));
          orb.style.setProperty("--drift-x", (side * rand(14, 38)).toFixed(2));
          orb.style.setProperty("--drift-y", rand(-18, 18).toFixed(2));
          orb.style.setProperty("--end-x", (side * rand(28, 60)).toFixed(2));
          orb.style.setProperty("--end-y", rand(-28, 28).toFixed(2));
          orb.style.setProperty("--delay", rand(0, 5200).toFixed(2));
          orb.style.setProperty("--dur", rand(7400, 12200).toFixed(2));
          fragment.appendChild(orb);
        }

        for (let i = 0; i < glintCount; i++) {
          const glint = document.createElement("span");
          const direction = i % 2 === 0 ? 1 : -1;

          glint.className = "letter-page-glint";
          glint.style.setProperty("--w", rand(130, 240).toFixed(2));
          glint.style.setProperty("--x", (noteRect.left + noteRect.width * (direction > 0 ? 0.22 : 0.78)).toFixed(2));
          glint.style.setProperty("--y", (noteRect.top + noteRect.height * rand(0.18, 0.82)).toFixed(2));
          glint.style.setProperty("--shift-x", (direction * noteRect.width * 0.18).toFixed(2));
          glint.style.setProperty("--shift-y", rand(-8, 8).toFixed(2));
          glint.style.setProperty("--end-x", (direction * noteRect.width * 0.42).toFixed(2));
          glint.style.setProperty("--end-y", rand(-18, 18).toFixed(2));
          glint.style.setProperty("--angle", (direction > 0 ? rand(-6, 5) : rand(176, 186)).toFixed(2));
          glint.style.setProperty("--delay", (i * 1400 + rand(0, 900)).toFixed(2));
          glint.style.setProperty("--dur", rand(6200, 9400).toFixed(2));
          fragment.appendChild(glint);
        }
      }

      document.body.appendChild(fragment);

    function showLetter() {
      const mainPage = document.getElementById("mainPage");
      const letterPage = document.getElementById("letterPage");
      const target = document.getElementById("letterText");
      const openButton = document.querySelector(".open-letter-btn");

      if (mainPage.dataset.opening === "true") return;
      mainPage.dataset.opening = "true";

      clearConfetti();
      cleanupCakeIntroParticles();
      if (openButton) {
        openButton.disabled = true;
        createOpenLetterBurst(openButton);
      }

      mainPage.classList.add("opening-out");

      const letter = `Nhân ngày đặc biệt này, chúc Minh Khanh luôn thật vui vẻ, rạng rỡ và được yêu thương thật nhiều.
Mong mọi điều dịu dàng, may mắn và hạnh phúc nhất sẽ luôn ở bên bạn.
Chúc bạn có một sinh nhật thật đẹp, thật đáng nhớ và tràn đầy tiếng cười.

✨ Gửi từ,
- KHANH TOAN ❤️`;

      let index = 0;
      const speed = 40;
      const tokens = letter.match(/\n|[^\s\n]+|[ \t]+/g) || [];

      function typeText() {
        if (index < tokens.length) {
          const token = tokens[index];

          if (token === "\n") {
            target.appendChild(document.createElement("br"));
          } else if (token.trim() === "") {
            const spaceElement = document.createElement("span");
            spaceElement.className = "letter-space";
            spaceElement.textContent = token;
            target.appendChild(spaceElement);
          } else {
            const wordElement = document.createElement("span");
            wordElement.className = "letter-word";

            if (token.includes("❤️") || token.includes("❤")) {
              wordElement.classList.add("red-heart");
            }

            const letters = Array.from(token);

            for (let i = 0; i < letters.length; i++) {
              const charElement = document.createElement("span");

              charElement.className = "letter-char";
              charElement.textContent = letters[i];
              charElement.style.animationDelay = i * 16 + "ms";

              if (i === 0 || i === letters.length - 1) {
                charElement.classList.add("spark");
              }

              wordElement.appendChild(charElement);
            }

            target.appendChild(wordElement);
          }

          index++;
          setTimeout(typeText, speed);
          return;
        }

        target.classList.remove("typing");
      }

      setTimeout(() => {
        mainPage.style.display = "none";
        document.getElementById("openingStage")?.replaceChildren();
        letterPage.style.display = "flex";
        letterPage.classList.add("intro-playing");
        letterPage.classList.remove("final-reveal");
        target.textContent = "";
        target.classList.add("typing");
        createCakeIntroParticles();
      }, 980);

      setTimeout(() => {
        letterPage.classList.remove("intro-playing");
        letterPage.classList.add("final-reveal");
        createConfetti();
        createLetterPageEffects();
        setTimeout(cleanupCakeIntroParticles, 1400);
        setTimeout(typeText, 850);
      }, 22980);
    }

    createOpeningPageEffects();
    window.addEventListener("resize", () => {
      if (document.getElementById("letterPage")?.classList.contains("final-reveal")) {
        clearTimeout(window.__letterEffectResizeTimer);
        window.__letterEffectResizeTimer = setTimeout(createLetterPageEffects, 220);
        return;
      }

      if (document.getElementById("mainPage")?.style.display === "none") return;
      clearTimeout(window.__openingEffectResizeTimer);
      window.__openingEffectResizeTimer = setTimeout(createOpeningPageEffects, 220);
    });
  </script>
</body>
</html>
